<!doctype html>
<html>
  <head>
    <title>CSS Example</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="Assignment4.css" />

    <!-- Internal CSS -->
    <style>
      h2 {
        color: blue;
        text-align: center;
      }

      table {
        border-collapse: collapse;
        width: 1000px;
        margin: auto;
      }

      th {
        background-color: rgb(246, 74, 74);
      }
    </style>
  </head>

  <body>
    <!-- Inline CSS -->
    <h1 style="color: rgb(8, 194, 241); text-align: center; font-size: 100px">
      Student Information
    </h1>

    <h2>Computer Engineering Students</h2>

    <table border="1">
      <tr>
        <th>Roll No</th>
        <th>Name</th>
        <th>Course</th>
      </tr>

      <tr>
        <td>1</td>
        <td>Vijay</td>
        <td>Computer Engineering</td>
      </tr>

      <tr>
        <td>2</td>
        <td>Rahul</td>
        <td>Information Technology</td>
      </tr>

      <tr>
        <td>3</td>
        <td>Arkaj</td>
        <td>Artificial Intelligence</td>
      </tr>
    </table>
  </body>
</html>
